name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build
        env:
          VITE_GAS_URL:       ${{ secrets.VITE_GAS_URL }}
          VITE_VIEW_TOKEN:    ${{ secrets.VITE_VIEW_TOKEN }}
          VITE_EDIT_TOKEN:    ${{ secrets.VITE_EDIT_TOKEN }}
          VITE_APP_NAME:      ${{ vars.VITE_APP_NAME }}
          VITE_APP_SUBTITLE:  ${{ vars.VITE_APP_SUBTITLE }}
        run: npm run build
        working-directory: frontend

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
